<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الدفع | TradeLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #4ade80;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .confirm-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(74, 222, 128, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon-box i {
            font-size: 2.5rem;
            color: var(--primary);
        }

        h2 {
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .form-control {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--primary);
            box-shadow: none;
            color: var(--text);
        }

        .btn-confirm {
            background: var(--primary);
            color: #064e3b;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(74, 222, 128, 0.3);
            background: #22c55e;
            color: #064e3b;
        }

        .timer {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .toast-wrap {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        .toast-msg {
            background: #1e293b;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            border-left: 4px solid #4ade80;
            margin-bottom: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div class="confirm-card">
        <div class="logo-box mb-4 text-center">
            <img src="assets/logo.png" alt="TradeLink Logo" style="width: 60px; margin-bottom: 15px;">
            <h4 style="font-size: 1.2rem; font-weight: 700; color: #ef4444; margin: 0;">TradeLink</h4>
        </div>
        <h2>تأكيد الدفع</h2>
        <p>لقد طلبنا عملية دفع عبر محفظتك الإلكترونية. يرجى إدخال الرقم الذي أرسلناه لك عبر الرسالة النصية للتأكيد.</p>

        <div class="mb-3 text-start">
            <label class="form-label small text-muted">رقم الهاتف</label>
            <input type="text" id="phone" class="form-control" placeholder="01xxxxxxxxx" readonly>
        </div>

        <div class="mb-4 text-start">
            <label class="form-label small text-muted">كود التأكيد</label>
            <input type="text" id="code" class="form-control" placeholder="----" maxlength="4">
        </div>

        <button class="btn-confirm" onclick="verify()">تأكيد العملية الآن</button>

        <div class="timer">
            لم يصلك الكود؟ <a href="#" onclick="resendCode(event)"
                style="color:var(--primary);text-decoration:none">إعادة الإرسال</a>
        </div>
    </div>

    <div class="toast-wrap" id="tw"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');
        const phone = urlParams.get('phone') || '01xxxxxxxxx';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        async function fwa(u, o = {}) {
            o.headers = { ...o.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
            return fetch(u, o);
        }

        document.getElementById('phone').value = phone;

        if (!token) {
            toast('يجب تسجيل الدخول أولاً', 'error');
            setTimeout(() => {
                window.location.href = '/auth.html';
            }, 1500);
        }

        async function verify() {
            const code = document.getElementById('code').value.trim();

            if (!code) {
                toast('يرجى إدخال الكود', 'error');
                return;
            }

            if (code.length !== 4) {
                toast('كود التأكيد يجب أن يكون 4 أرقام', 'error');
                return;
            }

            if (!token) {
                toast('انتهت الجلسة، سجل الدخول مرة أخرى', 'error');
                setTimeout(() => {
                    window.location.href = '/auth.html';
                }, 1500);
                return;
            }

            try {
                const r = await fwa('/api/payments/verify-otp', {
                    method: 'POST',
                    body: JSON.stringify({
                        order_id: orderId,
                        phone: phone,
                        code: code
                    })
                });

                const j = await r.json();

                if (r.status === 401) {
                    toast('Unauthorized - please login', 'error');
                    setTimeout(() => {
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        window.location.href = '/auth.html';
                    }, 1500);
                    return;
                }

                if (j.success) {
                    toast('تم التحقق بنجاح! جاري إكمال الطلب...', 'success');
                    setTimeout(() => {
                        if (user?.role?.name === 'Admin') {
                            window.location.href = '/admin-dashboard.html';
                        } else if (user?.role?.name === 'Supplier') {
                            window.location.href = '/supplier-dashboard.html';
                        } else if (user?.role?.name === 'Wholesaler') {
                            window.location.href = '/wholesaler-dashboard.html';
                        } else {
                            window.location.href = '/retailer-dashboard.html';
                        }
                    }, 2000);
                } else {
                    toast(j.error || 'كود التأكيد غير صحيح. حاول مرة أخرى.', 'error');
                }
            } catch (e) {
                toast('خطأ في الاتصال بالسيرفر', 'error');
            }
        }

        async function resendCode(event) {
            event.preventDefault();

            if (!token) {
                toast('يجب تسجيل الدخول أولاً', 'error');
                return;
            }

            try {
                const r = await fwa('/api/payments/resend-otp', {
                    method: 'POST',
                    body: JSON.stringify({
                        order_id: orderId,
                        phone: phone
                    })
                });

                const j = await r.json();

                if (r.status === 401) {
                    toast('Unauthorized - please login', 'error');
                    return;
                }

                if (j.success) {
                    toast('تم إرسال كود جديد بنجاح', 'success');
                } else {
                    toast(j.error || 'تعذر إعادة إرسال الكود', 'error');
                }
            } catch (e) {
                toast('خطأ في الاتصال بالسيرفر', 'error');
            }
        }

        function toast(msg, type) {
            const tw = document.getElementById('tw');
            const d = document.createElement('div');
            d.className = 'toast-msg';

            if (type === 'error') d.style.borderLeftColor = '#ef4444';
            if (type === 'success') d.style.borderLeftColor = '#4ade80';

            d.textContent = msg;
            tw.appendChild(d);

            setTimeout(() => {
                d.remove();
            }, 3000);
        }
    </script>
</body>

</html>
