<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول / إنشاء حساب - TradeLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').then(reg => {
                    console.log('ServiceWorker registration successful');
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: #0b0f19;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 50%, rgba(239, 68, 68, .06) 0%, transparent 50%), radial-gradient(ellipse at 70% 30%, rgba(249, 115, 22, .04) 0%, transparent 50%);
            z-index: 0
        }

        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 20px
        }

        .logo {
            text-align: center;
            margin-bottom: 30px
        }

        .logo h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ef4444, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .logo p {
            color: #64748b;
            font-size: .85rem
        }

        .auth-card {
            background: rgba(17, 24, 39, .8);
            border: 1px solid rgba(239, 68, 68, .12);
            border-radius: 20px;
            padding: 35px;
            backdrop-filter: blur(10px)
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            background: rgba(11, 15, 25, .5);
            border-radius: 12px;
            padding: 4px
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: .9rem;
            color: #64748b;
            transition: all .3s;
            border: none;
            background: none;
            font-family: 'Cairo', sans-serif
        }

        .tab.active {
            background: linear-gradient(135deg, #ef4444, #f97316);
            color: #fff
        }

        .tab:hover:not(.active) {
            color: #94a3b8
        }

        .form-group {
            margin-bottom: 18px
        }

        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: .8rem;
            font-weight: 600;
            margin-bottom: 6px
        }

        .form-group input,
        .form-group select {
            width: 100%;
            background: rgba(11, 15, 25, .7);
            border: 1px solid rgba(239, 68, 68, .12);
            color: #e2e8f0;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: .9rem;
            font-family: 'Cairo', sans-serif;
            transition: all .3s
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, .1)
        }

        .form-group input::placeholder {
            color: #475569
        }

        .form-group select option {
            background: #111827;
            color: #e2e8f0
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ef4444, #f97316);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .3s;
            font-family: 'Cairo', sans-serif
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(239, 68, 68, .3)
        }

        .btn-submit:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: .85rem;
            margin-bottom: 16px;
            display: none
        }

        .alert-success {
            background: rgba(34, 197, 94, .1);
            border: 1px solid rgba(34, 197, 94, .2);
            color: #4ade80;
            display: block
        }

        .alert-error {
            background: rgba(239, 68, 68, .1);
            border: 1px solid rgba(239, 68, 68, .2);
            color: #fca5a5;
            display: block
        }

        .back-link {
            text-align: center;
            margin-top: 20px
        }

        .back-link a {
            color: #64748b;
            font-size: .85rem;
            text-decoration: none;
            transition: color .3s
        }

        .back-link a:hover {
            color: #fca5a5
        }

        .hidden {
            display: none
        }

        .role-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 18px
        }

        .role-card {
            background: rgba(11, 15, 25, .5);
            border: 1px solid rgba(239, 68, 68, .1);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            transition: all .3s
        }

        .role-card:hover {
            border-color: rgba(239, 68, 68, .3)
        }

        .role-card.selected {
            border-color: #ef4444;
            background: rgba(239, 68, 68, .08)
        }

        .role-card i {
            font-size: 1.4rem;
            margin-bottom: 6px;
            display: block
        }

        .role-card span {
            font-size: .8rem;
            color: #94a3b8
        }

        .role-card.selected span {
            color: #fca5a5
        }
        @media (max-width: 480px) {
            .role-cards {
                grid-template-columns: 1fr;
            }
            .auth-card {
                padding: 25px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="logo">
            <img src="assets/logo.png" alt="TradeLink Logo" style="width: 60px; margin-bottom: 20px;">
            <p style="font-size: 1.5rem; font-weight: 700; color: #ef4444; margin: 0; line-height: 1;">TradeLink</p>
            <p style="color: #64748b; font-size: 0.9rem; margin-top: 8px;">منصة التجارة المتكاملة</p>
        </div>
        <div class="auth-card">
            <div class="tabs">
                <button class="tab active" onclick="showTab('login')">تسجيل الدخول</button>
                <button class="tab" onclick="showTab('register')">إنشاء حساب</button>
            </div>
            <div id="alert-box" class="alert"></div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="l-email"
                        placeholder="example@email.com" required></div>
                <div class="form-group"><label>كلمة المرور</label><input type="password" id="l-pass"
                        placeholder="••••••••" required></div>
                <button type="submit" class="btn-submit" id="l-btn"><i class="fas fa-sign-in-alt me-2"></i>تسجيل
                    الدخول</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
                <div class="form-group"><label>نوع الحساب</label>
                    <div class="role-cards">
                        <div class="role-card" onclick="selectRole(this,'Supplier')" data-role="Supplier"><i
                                class="fas fa-industry" style="color:#60a5fa"></i><span>مورد</span></div>
                        <div class="role-card" onclick="selectRole(this,'Wholesaler')" data-role="Wholesaler"><i
                                class="fas fa-store" style="color:#c084fc"></i><span>تاجر جملة</span></div>
                        <div class="role-card" onclick="selectRole(this,'Retailer')" data-role="Retailer"><i
                                class="fas fa-shopping-cart" style="color:#fb923c"></i><span>تاجر تجزئة</span></div>
                        <div class="role-card" onclick="selectRole(this,'Customer')" data-role="Customer"><i
                                class="fas fa-user" style="color:#4ade80"></i><span>مستهلك</span></div>
                    </div>
                </div>
                <div class="form-group"><label>الاسم الكامل</label><input type="text" id="r-name"
                        placeholder="مثال: أحمد محمد" required></div>
                <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="r-email"
                        placeholder="example@email.com" required></div>
                <div class="form-group"><label>كلمة المرور</label><input type="password" id="r-pass"
                        placeholder="6 أحرف على الأقل" minlength="6" required></div>
                <div class="form-group"><label>اسم الشركة / المتجر</label><input type="text" id="r-company"
                        placeholder="اختياري"></div>
                <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="r-phone" required
                        placeholder="01xxxxxxxxx"></div>
                <div class="form-group"><label>المحافظة</label>
                    <select id="r-gov" onchange="updCen()" required>
                        <option value="">اختر المحافظة</option>
                    </select>
                </div>
                <div class="form-group"><label>المركز / الحي</label>
                    <select id="r-center" required>
                        <option value="">اختر المركز أولاً</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit" id="r-btn"><i class="fas fa-user-plus me-2"></i>إنشاء
                    الحساب</button>
            </form>
        </div>
        <div class="back-link"><a href="/"><i class="fas fa-arrow-right me-1"></i> العودة للرئيسية</a></div>
    </div>
    <script>
        let selectedRoleId = null, rolesMap = {}, eLocs = [];
        async function loadRoles() { try { const r = await fetch('/api/users/roles'); const j = await r.json(); if (j.success) (j.data || []).forEach(r => { rolesMap[r.name] = r.id; }); } catch (e) { console.error(e); } }
        async function loadLocs() { try { const r = await fetch('/api/locations/egypt'); const j = await r.json(); if (j.success) { eLocs = j.data; const g = document.getElementById('r-gov'); g.innerHTML = '<option value="">اختر المحافظة</option>' + eLocs.map(x => `<option value="${x.governorate}">${x.governorate}</option>`).join(''); } } catch (e) { console.error(e); } }
        function updCen() { const g = document.getElementById('r-gov').value; const c = document.getElementById('r-center'); const gov = eLocs.find(x => x.governorate === g); if (gov) { c.innerHTML = '<option value="">اختر المركز</option>' + gov.centers.map(x => `<option value="${x}">${x}</option>`).join(''); } else { c.innerHTML = '<option value="">اختر المركز أولاً</option>'; } }
        loadRoles();
        loadLocs();
        function showTab(t) { document.querySelectorAll('.tab').forEach(b => b.classList.remove('active')); document.querySelector(`.tab:${t === 'login' ? 'first' : 'last'}-child`).classList.add('active'); document.getElementById('login-form').classList.toggle('hidden', t !== 'login'); document.getElementById('register-form').classList.toggle('hidden', t !== 'register'); hideAlert(); }
        function selectRole(el, role) { document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected')); el.classList.add('selected'); selectedRoleId = rolesMap[role]; }
        function showAlert(msg, type) { const a = document.getElementById('alert-box'); a.textContent = msg; a.className = 'alert alert-' + type; }
        function hideAlert() { document.getElementById('alert-box').className = 'alert'; }

        async function handleLogin(e) {
            e.preventDefault(); hideAlert();
            const email = document.getElementById('l-email').value, pass = document.getElementById('l-pass').value;
            document.getElementById('l-btn').disabled = true;
            try {
                const r = await fetch('/api/users/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password: pass }) });
                const j = await r.json();
                if (j.success) {
                    localStorage.setItem('token', j.token);
                    localStorage.setItem('user', JSON.stringify(j.user));
                    const role = j.user.role?.name || '';
                    showAlert('تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
                    setTimeout(() => {
                        if (role === 'Admin') window.location = '/admin-dashboard.html';
                        else if (role === 'Supplier') window.location = '/supplier-dashboard.html';
                        else if (role === 'Wholesaler') window.location = '/wholesaler-dashboard.html';
                        else if (role === 'Retailer') window.location = '/retailer-dashboard.html';
                        else window.location = '/consumer-dashboard.html';
                    }, 1000);
                } else { showAlert(j.error || 'خطأ في تسجيل الدخول', 'error'); }
            } catch (err) { showAlert('خطأ في الاتصال بالسيرفر', 'error'); }
            document.getElementById('l-btn').disabled = false;
        }

        async function handleRegister(e) {
            e.preventDefault(); hideAlert();
            if (!selectedRoleId) { showAlert('يرجى اختيار نوع الحساب', 'error'); return; }
            document.getElementById('r-btn').disabled = true;
            const data = { 
                name: document.getElementById('r-name').value, 
                email: document.getElementById('r-email').value, 
                password: document.getElementById('r-pass').value, 
                role_id: selectedRoleId, 
                company_name: document.getElementById('r-company').value, 
                phone: document.getElementById('r-phone').value, 
                governorate: document.getElementById('r-gov').value,
                center: document.getElementById('r-center').value,
                location: `${document.getElementById('r-gov').value}, ${document.getElementById('r-center').value}`
            };
            try {
                const r = await fetch('/api/users/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const j = await r.json();
                if (j.success) { showAlert(j.message || 'تم إنشاء الحساب بنجاح. في انتظار تأكيد الأدمن.', 'success'); document.getElementById('register-form').reset(); document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected')); selectedRoleId = null; }
                else { showAlert(j.error || 'خطأ في إنشاء الحساب', 'error'); }
            } catch (err) { showAlert('خطأ في الاتصال بالسيرفر', 'error'); }
            document.getElementById('r-btn').disabled = false;
        }
    </script>
    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
</body>

</html>
